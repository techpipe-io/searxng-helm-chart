name: Release Helm chart

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate tag matches chart version
        run: |
          python3 - <<'PY'
          import os
          import re
          import pathlib
          import yaml
          tag = os.environ["GITHUB_REF_NAME"]
          if tag.startswith("v"):
              tag = tag[1:]
          if not re.fullmatch(r"\d+\.\d+\.\d+", tag):
              raise SystemExit(f"tag {tag!r} is not semver")
          chart = yaml.safe_load(pathlib.Path("charts/searxng/Chart.yaml").read_text())
          if chart["version"] != tag:
              raise SystemExit(f"Chart.yaml version {chart['version']} does not match tag {tag}")
          PY

      - name: Helm lint
        run: helm lint charts/searxng

      - name: Helm render default
        run: helm template smoke charts/searxng > /tmp/render-default.yaml

      - name: Helm render ingress
        run: helm template smoke charts/searxng --set ingress.enabled=true --set ingress.hosts[0].host=searxng.local > /tmp/render-ingress.yaml

      - name: Helm render gateway api
        run: helm template smoke charts/searxng --set gateway.enabled=true --set gateway.parentRefs[0].name=public --set gateway.hostnames[0]=searxng.local > /tmp/render-gateway.yaml

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Helm install smoke test
        run: helm upgrade --install searxng charts/searxng --namespace searxng --create-namespace --wait --timeout 10m

      - name: Helm test
        run: helm test searxng --namespace searxng

      - name: Configure Git
        run: |
          git config user.name "techpipe-io"
          git config user.email "272725734+techpipe-io@users.noreply.github.com"

      - name: Run chart releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
