{{- if gt (len .Values.config.secretFiles) 0 }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "searxng.configSecretName" . }}
  labels:
    {{- include "searxng.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $name, $content := .Values.config.secretFiles }}
  {{ $name }}: |
{{ tpl $content $ | nindent 4 }}
{{- end }}
{{- end }}
