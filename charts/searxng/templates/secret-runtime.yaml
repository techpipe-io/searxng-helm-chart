{{- if eq (include "searxng.createRuntimeEnvSecret" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "searxng.runtimeEnvSecretName" . }}
  labels:
    {{- include "searxng.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.secret.create (not .Values.secret.existingSecret) (not (hasKey .Values.env.values "SEARXNG_SECRET")) (not (hasKey .Values.env.secretValues "SEARXNG_SECRET")) }}
  SEARXNG_SECRET: {{ include "searxng.searxngSecretValue" . | quote }}
  {{- end }}
  {{- if and (not (hasKey .Values.env.values "SEARXNG_VALKEY_URL")) (not (hasKey .Values.env.secretValues "SEARXNG_VALKEY_URL")) (not .Values.valkey.externalUrlSecret.name) (or .Values.valkey.externalUrl .Values.valkey.enabled) }}
  SEARXNG_VALKEY_URL: {{ include "searxng.managedValkeyUrl" . | quote }}
  {{- end }}
  {{- range $k, $v := .Values.env.secretValues }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
